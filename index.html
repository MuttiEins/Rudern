<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rudern auf Deutsch</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e8e0d5; font-family: Georgia, serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 0 16px 40px; }
  header { width: 100%; max-width: 720px; padding: 24px 0 12px; border-bottom: 2px solid #2a9d8f33; margin-bottom: 20px; display: flex; align-items: baseline; gap: 12px; }
  .title { font-size: 26px; font-weight: 700; color: #2a9d8f; }
  .subtitle { font-size: 12px; color: #888; letter-spacing: 2px; text-transform: uppercase; font-family: monospace; }
  .tabs { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 24px; max-width: 720px; width: 100%; }
  .tab { background: transparent; border: 1.5px solid #333; color: #888; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 13px; font-family: monospace; transition: all 0.18s; }
  .tab.active { color: #fff; }
  .progress-bar-wrap { width: 100%; max-width: 560px; margin-bottom: 18px; }
  .progress-info { display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-bottom: 6px; font-family: monospace; }
  .progress-track { height: 4px; background: #1e2533; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width 0.3s ease; }
  .flip-toggle { margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
  .flip-btn { background: #1a2030; border: 1px solid #333; border-radius: 20px; padding: 5px 14px; color: #aaa; cursor: pointer; font-size: 12px; font-family: monospace; }
  .mode-toggle { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; max-width: 620px; width: 100%; }
  .mode-btn { background: transparent; border: 1.5px solid #333; color: #666; border-radius: 8px; padding: 8px 16px; cursor: pointer; font-size: 13px; font-family: monospace; transition: all 0.18s; }
  .mode-btn.active { background: #1a2a3a; border-color: #2a9d8f; color: #2a9d8f; font-weight: 700; }
  .audio-front { background: #0c1a2a !important; border-color: #2a9d8f55 !important; }
  body.mode-audio #front-text { visibility: hidden !important; height: 0 !important; overflow: hidden !important; margin: 0 !important; padding: 0 !important; font-size: 0 !important; }
  body.mode-audio #card-front { background: #0c1a2a !important; border-color: #2a9d8f55 !important; }
  body.mode-en-audio #card-back { background: #0c1a2a !important; border-color: #2a9d8f55 !important; }
  .audio-icon { font-size: 64px; margin-bottom: 8px; }
  .card-wrap { width: 100%; max-width: 560px; min-height: 260px; perspective: 800px; cursor: pointer; margin-bottom: 20px; position: relative; transition: transform 0.22s ease, opacity 0.22s ease; }
  .card-inner { width: 100%; min-height: 260px; transform-style: preserve-3d; transition: transform 0.45s cubic-bezier(0.4,0.2,0.2,1); position: relative; }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; width: 100%; min-height: 260px; backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px 36px; }
  .card-front { background: #111824; border: 2px solid #1e2a3a; box-shadow: 0 12px 40px #00000066; }
  .card-front.known { background: #0d2a1e; border-color: #2a9d8f55; }
  .card-front.unknown { background: #2a0d12; border-color: #e6394655; }
  .card-back { background: #0c1520; transform: rotateY(180deg); box-shadow: 0 12px 40px #00000066; }
  .card-lang { font-size: 12px; font-family: monospace; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; opacity: 0.8; }
  .card-text { font-size: 32px; font-weight: 600; text-align: center; color: #f0ebe3; line-height: 1.3; letter-spacing: -0.3px; }
  .card-text.long { font-size: 20px; }
  .card-text.medium { font-size: 26px; }
  .card-note { margin-top: 12px; padding: 5px 12px; background: #ffffff08; border-radius: 8px; font-size: 12px; color: #888; font-family: monospace; }
  .card-hint { margin-top: 14px; font-size: 12px; color: #333; font-family: monospace; letter-spacing: 1px; }
  .speak-btn { margin-top: 14px; background: #ffffff0a; border: 1.5px solid #2a3545; border-radius: 50%; width: 46px; height: 46px; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .speak-btn.speaking { transform: scale(1.15); border-color: #2a9d8f; background: #2a9d8f22; }
  .actions { display: flex; gap: 12px; margin-bottom: 18px; align-items: center; }
  .nav-btn { background: transparent; border: 1.5px solid #2a3545; color: #666; border-radius: 10px; padding: 10px 18px; cursor: pointer; font-size: 18px; }
  .still-btn { background: #e63946; border: none; color: #fff; border-radius: 12px; padding: 14px 24px; cursor: pointer; font-size: 18px; font-weight: 700; font-family: Georgia, serif; box-shadow: 0 4px 12px #e6394655; }
  .gotit-btn { background: #2a9d8f; border: none; color: #fff; border-radius: 12px; padding: 14px 24px; cursor: pointer; font-size: 18px; font-weight: 700; font-family: Georgia, serif; box-shadow: 0 4px 12px #2a9d8f55; }
  .shuffle-btn { background: transparent; border: none; color: #444; cursor: pointer; font-size: 12px; font-family: monospace; letter-spacing: 1px; margin-bottom: 8px; }
  .key-hint { font-size: 11px; color: #2a3545; font-family: monospace; letter-spacing: 0.5px; }
</style>
</head>
<body>

<header>
  <div class="title">Rudern auf Deutsch</div>
  <div class="subtitle">Rowing Flashcards</div>
</header>

<div class="tabs" id="tabs"></div>

<div class="progress-bar-wrap">
  <div class="progress-info">
    <span id="card-counter">Card 1 / 1</span>
    <span style="color:#2a9d8f" id="known-counter">✓ 0 known</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
</div>

<div class="mode-toggle">
  <button class="mode-btn active" id="mode-de-en" onclick="setMode('de-en')">🇩🇪 → 🇬🇧 German to English</button>
  <button class="mode-btn" id="mode-en-de" onclick="setMode('en-de')">🇬🇧 → 🇩🇪 English to German</button>
  <button class="mode-btn" id="mode-audio" onclick="setMode('audio')">🔊 Audio only</button>
  <button class="mode-btn" id="mode-en-audio" onclick="setMode('en-audio')">🇬🇧 → 🔊 English then Audio</button>
</div>

<div class="card-wrap" id="card-wrap" onclick="flipCard()">
  <div class="card-inner" id="card-inner">
    <div class="card-face card-front" id="card-front">
      <div class="card-lang" id="front-lang"></div>
      <div class="card-text" id="front-text"></div>
      <button class="speak-btn" id="speak-btn" onclick="event.stopPropagation(); speakWord()">🔈</button>
      <div class="card-hint" id="card-hint">tap card to flip ↩</div>
    </div>
    <div class="card-face card-back" id="card-back">
      <div class="card-lang" id="back-lang"></div>
      <div class="card-text" id="back-text"></div>
      <div class="card-text" id="back-text-de" style="margin-top:8px;font-size:20px;color:#2a9d8f;display:none"></div>
      <button class="speak-btn" id="speak-btn-back" onclick="event.stopPropagation(); speakWord()" style="display:none;margin-top:12px">🔈</button>
      <div class="card-note" id="back-note" style="display:none"></div>
    </div>
  </div>
</div>

<div class="actions">
  <button class="nav-btn" onclick="go(-1)">←</button>
  <button class="still-btn" onclick="markUnknown()">✗ Still learning</button>
  <button class="gotit-btn" onclick="markKnown()">✓ Got it</button>
  <button class="nav-btn" onclick="go(1)">→</button>
</div>

<button class="shuffle-btn" onclick="shuffleDeck()">⟳ Shuffle deck</button>
<button class="shuffle-btn" onclick="resetToday()" style="color:#e63946;margin-left:12px">✕ Reset today's progress</button>
<div class="key-hint">space/enter = flip &nbsp;·&nbsp; ← → = navigate &nbsp;·&nbsp; g = got it &nbsp;·&nbsp; b = still learning</div>

let activeCat = "words", cards = [], index = 0, isFlipped = false;
let mode = "de-en"; // "de-en" | "en-de" | "audio"
let known = new Set(), unknown = new Set();
const STORAGE_KEY = "rudern_known_v1";
const TWENTY_FOUR_HOURS = 24 * 60 * 60 * 1000;

// Load known cards from localStorage, filtering out any older than 24h
function loadKnown() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return {};
    const data = JSON.parse(raw);
    const now = Date.now();
    // Remove expired entries
    Object.keys(data).forEach(k => { if (now - data[k] > TWENTY_FOUR_HOURS) delete data[k]; });
    return data;
  } catch { return {}; }
}

function saveKnown(knownMap) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(knownMap)); } catch {}
}

// Returns a map of { cardKey: timestamp } for known cards
function cardKey(catKey, cardDe) { return catKey + "|" + cardDe; }

function getKnownTimestamps() { return loadKnown(); }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function init() {
  document.body.classList.add("mode-" + mode);
  // Restore known cards from localStorage
  const stored = getKnownTimestamps();
  known = new Set();
  Object.entries(stored).forEach(([k, ts]) => {
    if (k.startsWith(activeCat + "|")) {
      const de = k.split("|")[1];
      const idx = CATEGORIES[activeCat].cards.findIndex(c => c.de === de);
      if (idx >= 0) known.add(idx);
    }
  });
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = "";
  Object.entries(CATEGORIES).forEach(([key, cat]) => {
    const btn = document.createElement("button");
    btn.className = "tab" + (key === activeCat ? " active" : "");
    btn.style.borderColor = key === activeCat ? cat.color : "#333";
    btn.style.background = key === activeCat ? cat.color : "transparent";
    btn.textContent = cat.emoji + " " + cat.label + " (" + cat.cards.length + ")";
    btn.onclick = () => selectCat(key);
    tabsEl.appendChild(btn);
  });
  // Filter out known cards from initial deck
  cards = shuffle(CATEGORIES[activeCat].cards.filter((c, i) => !known.has(i)));
  if (cards.length === 0) cards = shuffle(CATEGORIES[activeCat].cards);
  render();
  updateKnownCounter();
}

function selectCat(key) {
  activeCat = key; cards = shuffle(CATEGORIES[key].cards);
  index = 0; isFlipped = false; unknown = new Set();
  // Restore known cards for this category
  const stored = getKnownTimestamps();
  known = new Set();
  Object.entries(stored).forEach(([k, ts]) => {
    if (k.startsWith(key + "|")) {
      const de = k.split("|")[1];
      const idx = CATEGORIES[key].cards.findIndex(c => c.de === de);
      if (idx >= 0) known.add(idx);
    }
  });
  // Filter out known cards from the deck
  cards = shuffle(CATEGORIES[key].cards.filter((c, i) => !known.has(i)));
  if (cards.length === 0) cards = shuffle(CATEGORIES[key].cards); // all known, show all
  document.querySelectorAll(".tab").forEach((btn, i) => {
    const k = Object.keys(CATEGORIES)[i], cat = CATEGORIES[k];
    btn.className = "tab" + (k === key ? " active" : "");
    btn.style.borderColor = k === key ? cat.color : "#333";
    btn.style.background = k === key ? cat.color : "transparent";
  });
  render();
  updateKnownCounter();
}

function render() {
  const cat = CATEGORIES[activeCat], card = cards[index];
  document.getElementById("card-counter").textContent = "Card " + (index+1) + " / " + cards.length + " remaining";

  // Blank front text immediately in audio mode to prevent any flicker
  if (mode === "audio") {
    document.getElementById("front-text").textContent = "";
  }

  const front = document.getElementById("card-front");
  front.className = "card-face card-front";
  if (unknown.has(index)) front.classList.add("unknown");
  document.getElementById("card-back").style.border = "2px solid " + cat.color + "44";

  const ftEl = document.getElementById("front-text");
  const speakBtn = document.getElementById("speak-btn");
  const hintEl = document.getElementById("card-hint");
  const backLangEl = document.getElementById("back-lang");
  const btEl = document.getElementById("back-text");
  const btDeEl = document.getElementById("back-text-de");
  const noteEl = document.getElementById("back-note");

  if (mode === "de-en") {
    // Front: German word + speaker. Back: English
    document.getElementById("front-lang").textContent = "🇩🇪 Deutsch";
    document.getElementById("front-lang").style.color = cat.color;
    ftEl.textContent = card.de;
    ftEl.className = "card-text" + (card.de.length > 40 ? " long" : card.de.length > 25 ? " medium" : "");
    speakBtn.style.display = "flex";
    hintEl.textContent = "tap card to flip ↩";
    backLangEl.textContent = "🇬🇧 English";
    backLangEl.style.color = cat.color;
    btEl.textContent = card.en;
    btEl.className = "card-text" + (card.en.length > 40 ? " long" : card.en.length > 25 ? " medium" : "");
    btDeEl.style.display = "none";
    document.getElementById("speak-btn-back").style.display = "none";

  } else if (mode === "en-de") {
    // Front: English. Back: German word + speaker
    document.getElementById("front-lang").textContent = "🇬🇧 English";
    document.getElementById("front-lang").style.color = cat.color;
    ftEl.textContent = card.en;
    ftEl.className = "card-text" + (card.en.length > 40 ? " long" : card.en.length > 25 ? " medium" : "");
    speakBtn.style.display = "none";
    hintEl.textContent = "tap card to flip ↩";
    backLangEl.textContent = "🇩🇪 Deutsch";
    backLangEl.style.color = cat.color;
    btEl.textContent = card.de;
    btEl.className = "card-text" + (card.de.length > 40 ? " long" : card.de.length > 25 ? " medium" : "");
    btDeEl.style.display = "none";
    document.getElementById("speak-btn-back").style.display = "flex";

  } else if (mode === "audio") {
    // Front: speaker button only — text explicitly blanked first to prevent flicker
    ftEl.textContent = "";
    ftEl.className = "card-text";
    document.getElementById("front-lang").textContent = "🔊 Listen & identify";
    document.getElementById("front-lang").style.color = cat.color;
    speakBtn.style.display = "flex";
    speakBtn.style.width = "72px";
    speakBtn.style.height = "72px";
    speakBtn.style.fontSize = "36px";
    speakBtn.style.marginTop = "0";
    hintEl.textContent = "tap 🔈 to hear · tap card to reveal";
    front.classList.add("audio-front");
    // Back: German + English both shown
    backLangEl.textContent = "🇩🇪 German  +  🇬🇧 English";
    backLangEl.style.color = cat.color;
    btEl.textContent = card.de;
    btEl.className = "card-text" + (card.de.length > 40 ? " long" : card.de.length > 25 ? " medium" : "");
    btDeEl.textContent = card.en;
    btDeEl.style.display = "block";
    btDeEl.className = "card-text medium";
    document.getElementById("speak-btn-back").style.display = "none";

  } else if (mode === "en-audio") {
    // Front: English text. Back: big speaker button — no German text shown
    document.getElementById("front-lang").textContent = "🇬🇧 English";
    document.getElementById("front-lang").style.color = cat.color;
    ftEl.textContent = card.en;
    ftEl.className = "card-text" + (card.en.length > 40 ? " long" : card.en.length > 25 ? " medium" : "");
    speakBtn.style.display = "none";
    hintEl.textContent = "tap card to hear the German 🔊";
    backLangEl.textContent = "🔊 Tap to hear the German";
    backLangEl.style.color = cat.color;
    btEl.textContent = "";
    btDeEl.style.display = "none";
    document.getElementById("speak-btn-back").style.display = "flex";
    document.getElementById("speak-btn-back").style.width = "72px";
    document.getElementById("speak-btn-back").style.height = "72px";
    document.getElementById("speak-btn-back").style.fontSize = "36px";
    document.getElementById("speak-btn-back").style.marginTop = "20px";
  }

  // Reset speak button size if not audio/en-audio mode
  if (mode !== "audio" && mode !== "en-audio") {
    speakBtn.style.width = "46px"; speakBtn.style.height = "46px";
    speakBtn.style.fontSize = "22px"; speakBtn.style.marginTop = "14px";
  }

  if (card.note && mode !== "audio") { noteEl.textContent = card.note; noteEl.style.display = "block"; }
  else noteEl.style.display = "none";

  isFlipped = false;
  document.getElementById("card-inner").classList.remove("flipped");

  // Auto-play in audio mode — slight delay so card animation completes first
  if (mode === "audio") setTimeout(() => speakWord(), 500);
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById("card-inner").classList.toggle("flipped", isFlipped);
  // In en-audio mode, auto-play German audio when card flips to back
  if (mode === "en-audio" && isFlipped) {
    setTimeout(() => speakWord(), 400);
  }
}

function go(dir) {
  const total = cards.length, wrap = document.getElementById("card-wrap");
  // In audio mode blank text immediately before animation so it never shows during slide
  if (mode === "audio") document.getElementById("front-text").textContent = "";
  wrap.style.opacity = "0";
  wrap.style.transform = dir > 0 ? "translateX(60px)" : "translateX(-60px)";
  setTimeout(() => {
    index = (index + dir + total) % total; render();
    wrap.style.transition = "none"; wrap.style.opacity = "0";
    wrap.style.transform = dir > 0 ? "translateX(-60px)" : "translateX(60px)";
    setTimeout(() => { wrap.style.transition = "transform 0.22s ease, opacity 0.22s ease"; wrap.style.opacity = "1"; wrap.style.transform = "translateX(0)"; }, 20);
  }, 200);
}

function markKnown() {
  const card = cards[index];
  // Save to localStorage with current timestamp
  const stored = getKnownTimestamps();
  stored[cardKey(activeCat, card.de)] = Date.now();
  saveKnown(stored);
  // Remove card from current deck
  cards.splice(index, 1);
  unknown.delete(index);
  known = new Set(Object.keys(stored)
    .filter(k => k.startsWith(activeCat + "|"))
    .map(k => { const de = k.split("|")[1]; return CATEGORIES[activeCat].cards.findIndex(c => c.de === de); })
    .filter(i => i >= 0));
  if (cards.length === 0) {
    // All done! Show celebration
    document.getElementById("card-wrap").innerHTML = "<div style='text-align:center;padding:40px;color:#2a9d8f;font-size:22px;font-weight:600'>🎉 All cards known!<br><span style=\'font-size:14px;color:#888;font-family:monospace;font-weight:400\'>Come back tomorrow for a fresh session</span></div>";
    document.getElementById("card-counter").textContent = "All done!";
    return;
  }
  index = index % cards.length;
  render();
  updateKnownCounter();
}

function updateKnownCounter() {
  const stored = getKnownTimestamps();
  const total = CATEGORIES[activeCat].cards.length;
  const knownCount = Object.keys(stored).filter(k => k.startsWith(activeCat + "|")).length;
  document.getElementById("known-counter").textContent = "✓ " + knownCount + " / " + total + " known today";
  const pct = Math.round((knownCount / total) * 100);
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-fill").style.background = "linear-gradient(90deg," + CATEGORIES[activeCat].color + ",#2a9d8f)";
}
function markUnknown() { unknown.add(index); known.delete(index); go(1); }
function setMode(m) {
  mode = m;
  // Apply body class immediately so CSS hides text before JS render runs
  document.body.classList.remove("mode-audio", "mode-de-en", "mode-en-de", "mode-en-audio");
  document.body.classList.add("mode-" + m);
  document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("mode-" + m).classList.add("active");
  isFlipped = false;
  document.getElementById("card-inner").classList.remove("flipped");
  render();
}
function shuffleDeck() { cards = shuffle(cards); index = 0; render(); }
function resetToday() {
  if (!confirm("Reset all known cards for today? They will appear again.")) return;
  const stored = getKnownTimestamps();
  Object.keys(stored).forEach(k => { if (k.startsWith(activeCat + "|")) delete stored[k]; });
  saveKnown(stored);
  known = new Set();
  cards = shuffle(CATEGORIES[activeCat].cards);
  index = 0;
  render();
  updateKnownCounter();
}

async function speakWord() {
  const text = cards[index].de; // always speak German
  const btn = document.getElementById("speak-btn");
  btn.textContent = "🔊"; btn.classList.add("speaking");
  const done = () => { btn.textContent = "🔈"; btn.classList.remove("speaking"); };

  // Fetch Google Translate audio as a blob to avoid CORS issues
  try {
    const url = "https://translate.googleapis.com/translate_tts?ie=UTF-8&q=" + encodeURIComponent(text) + "&tl=de&client=gtx&ttsspeed=0.8";
    const resp = await fetch(url);
    if (!resp.ok) throw new Error("fetch failed");
    const blob = await resp.blob();
    const objUrl = URL.createObjectURL(blob);
    const audio = new Audio(objUrl);
    audio.onended = () => { done(); URL.revokeObjectURL(objUrl); };
    audio.onerror = () => { done(); URL.revokeObjectURL(objUrl); fallbackSpeak(text, done); };
    await audio.play();
  } catch {
    fallbackSpeak(text, done);
  }
}

function fallbackSpeak(text, done) {
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = "de-DE"; utt.rate = 0.85;
  utt.onend = done; utt.onerror = done;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utt);
}

document.addEventListener("keydown", (e) => {
  if (e.key === " " || e.key === "Enter") { e.preventDefault(); flipCard(); }
  if (e.key === "ArrowRight") go(1);
  if (e.key === "ArrowLeft") go(-1);
  if (e.key === "g") markKnown();
  if (e.key === "b") markUnknown();
});

init();
</script>
